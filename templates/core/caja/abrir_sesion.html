{% extends 'base.html' %}

{% block content %}
<div class="page-body">
  <div class="container-xl d-flex flex-column justify-content-center align-items-center" style="min-height: 70vh;">
    
    <div class="card shadow-sm" style="max-width: 500px; width: 100%;">
      <div class="card-header bg-primary text-white">
        <h3 class="card-title text-white">Apertura de Turno de Caja</h3>
      </div>
      <div class="card-body">
        
        <div class="alert alert-info" role="alert">
          <div class="d-flex">
            <div>
              <svg xmlns="http://www.w3.org/2000/svg" class="icon alert-icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M3 12a9 9 0 1 0 18 0a9 9 0 0 0 -18 0" /><path d="M12 9h.01" /><path d="M12 12v4" /></svg>
            </div>
            <div>
              Estás a punto de iniciar un nuevo turno. Declara el fondo de caja (sencillo) con el que estás recibiendo la gaveta.
            </div>
          </div>
        </div>

        <form method="POST">
          {% csrf_token %}
          
          <div class="mb-3">
            <label class="form-label fw-bold">Selecciona la Caja Física</label>
            {{ form.caja }}
          </div>
          
          <div class="mb-4">
            <label class="form-label fw-bold">Saldo Inicial (Fondo de vuelto)</label>
            <div class="input-group">
              <span class="input-group-text bg-light">$</span>
              {{ form.saldo_inicial }}
            </div>
          </div>
          
          <div class="form-footer mt-4">
            <button type="submit" class="btn btn-primary w-100 fs-3 py-2">
              <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M17 8v-3a1 1 0 0 0 -1 -1h-8m-3.413 .584a2 2 0 0 0 1.413 3.416h2m4 0h6a1 1 0 0 1 1 1v3" /><path d="M19 19a1 1 0 0 1 -1 1h-12a2 2 0 0 1 -2 -2v-12" /><path d="M16 12h4v4m-4 0a2 2 0 0 1 -2 -2" /></svg>
              Abrir Turno y Empezar a Cobrar
            </button>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}
