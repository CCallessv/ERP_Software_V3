<div class="modal-content">
    <div class="modal-header bg-warning-lt">
        <h5 class="modal-title">Registrar Ajuste Excepcional</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
    </div>
    <form action="{% url 'crear_ajuste' %}" method="POST">
        {% csrf_token %}
        <div class="modal-body">
            <div class="alert alert-info" role="alert">
                <div class="d-flex">
                    <div>
                        <svg xmlns="http://www.w3.org/2000/svg" class="icon alert-icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M3 12a9 9 0 1 0 18 0a9 9 0 0 0 -18 0" /><path d="M12 9h.01" /><path d="M12 12v4" /></svg>
                    </div>
                    <div>
                        Usa este módulo solo para casos excepcionales (mermas, daños, devoluciones sin factura). <strong>Afectará directamente el Kardex.</strong>
                    </div>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Selecciona el Producto</label>
                {{ form.producto }}
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Tipo de Movimiento</label>
                    {{ form.tipo }}
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Cantidad</label>
                    {{ form.cantidad }}
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Motivo de la Alteración</label>
                {{ form.motivo }}
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-link link-secondary me-auto" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-warning">Sellar y Ajustar Stock</button>
        </div>
    </form>
</div>
